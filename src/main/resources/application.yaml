server:
  port: 8086

spring:
  application:
    name: ms-franchise-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/franchise_db}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

appDescription: "Prueba técnica ms-franchise-service"
appVersion: "1.0.0"
